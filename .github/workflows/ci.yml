name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Unsafe fixture detects all five rules
        run: |
          python src/run_action.py --root tests/fixtures/unsafe --report /tmp/unsafe.md --json /tmp/unsafe.json
          python -c "import json; d=json.load(open('/tmp/unsafe.json')); assert {x['rule_id'] for x in d['findings']} == {'GHA001','GHA002','GHA003','GHA004','GHA005'}"
      - name: Safe fixture has no findings
        run: |
          python src/run_action.py --root tests/fixtures/safe --report /tmp/safe.md --json /tmp/safe.json --fail-on-findings
          python -c "import json; assert json.load(open('/tmp/safe.json'))['findings'] == []"
